databases:
  - name: n5-programming-db
    databaseName: n5_programming
    user: n5_programming
    plan: free

services:
  - type: web
    name: n5-programming-app
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    healthCheckPath: /health/
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_ENV
        value: "production"
      - key: DJANGO_ALLOWED_HOSTS
        value: "localhost,127.0.0.1"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: n5-programming-db
          property: connectionString
      - key: DATABASE_SSL_REQUIRE
        value: "1"
      - key: DJANGO_SECURE_SSL_REDIRECT
        value: "1"
      - key: SESSION_COOKIE_SAMESITE
        value: "Lax"
      - key: CSRF_COOKIE_SAMESITE
        value: "Lax"
      - key: SESSION_COOKIE_SECURE
        value: "1"
      - key: CSRF_COOKIE_SECURE
        value: "1"
